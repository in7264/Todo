<div class="min-h-screen bg-slate-50 text-slate-900">
  <nav class="bg-white shadow-sm">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6">
      <a class="text-xl font-semibold text-slate-900" routerLink="/tasks">TodoApp</a>
      <div class="flex gap-4">
        @if (isAuthenticated | async) {
          <button
            type="button"
            class="rounded-2xl bg-slate-100 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-200"
            (click)="logout()"
          >
            Logout
          </button>
        } @else {
          <a class="text-slate-600 hover:text-slate-900" routerLink="/login">Login</a>
        }
      </div>
    </div>
  </nav>
  <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6">
    <router-outlet></router-outlet>
  </main>
  <app-toast></app-toast>
</div>
